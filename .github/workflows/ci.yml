name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.0/gitleaks_8.30.0_linux_x64.tar.gz \
            | tar -xz
          sudo mv gitleaks /usr/local/bin/gitleaks

      - name: Secret scan
        run: gitleaks git --redact --no-banner .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint-build:
    name: lint-build
    runs-on: ubuntu-latest
    needs: gitleaks
    env:
      PRISMA_DISABLE_WARNINGS: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  proofs:
    name: proofs
    runs-on: ubuntu-latest
    needs: gitleaks
    env:
      PRISMA_DISABLE_WARNINGS: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Hardening proof
        run: TS_NODE_COMPILER_OPTIONS='{"module":"CommonJS","moduleResolution":"node"}' node -r ts-node/register/transpile-only scripts/prove-hardening.js

      - name: Payment webhook proof
        run: node scripts/prove-payment-webhooks.js

      - name: Payout gating proof
        run: node scripts/prove-payout-gating.js

      - name: Proof-based validation
        run: TS_NODE_COMPILER_OPTIONS='{"module":"CommonJS","moduleResolution":"node"}' node -r ts-node/register/transpile-only scripts/validate-proof-based.js

  launch-smokes:
    name: launch-smokes
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    needs: [lint-build, proofs]
    env:
      PRISMA_DISABLE_WARNINGS: "true"
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
      NOWPAYMENTS_API_KEY: ${{ secrets.NOWPAYMENTS_API_KEY }}
      NOWPAYMENTS_IPN_SECRET: ${{ secrets.NOWPAYMENTS_IPN_SECRET }}
      MERCADOPAGO_ACCESS_TOKEN: ${{ secrets.MERCADOPAGO_ACCESS_TOKEN }}
      MERCADOPAGO_WEBHOOK_SECRET: ${{ secrets.MERCADOPAGO_WEBHOOK_SECRET }}
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
      NEXT_PUBLIC_APP_URL: http://localhost:3004
      SUPPORT_EMAIL: ${{ secrets.SUPPORT_EMAIL }}
      PF_BASE_URL: http://localhost:3004
      PF_CRON_SECRET: ${{ secrets.CRON_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Validate launch-smoke secrets
        run: |
          test -n "${DATABASE_URL}"
          test -n "${DIRECT_URL}"
          test -n "${NEXT_PUBLIC_SUPABASE_URL}"
          test -n "${NEXT_PUBLIC_SUPABASE_ANON_KEY}"
          test -n "${SUPABASE_SERVICE_ROLE_KEY}"
          test -n "${CRON_SECRET}"

      - name: CI env audit
        run: CI_AUDIT_SCOPE=launch_smokes node scripts/audit-launch-env-ci.mjs

      - name: Build
        run: npm run build

      - name: Start app
        run: PORT=3004 npm start > /tmp/playfunded-ci.log 2>&1 &

      - name: Wait for app
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3004/en >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat /tmp/playfunded-ci.log
          exit 1

      - name: Admin smoke
        run: BASE_URL=http://localhost:3004 node scripts/run-admin-smoke.mjs

      - name: Payout KYC smoke
        run: BASE_URL=http://localhost:3004 node scripts/run-payout-kyc-ui-check.mjs

      - name: Admin support smoke
        run: BASE_URL=http://localhost:3004 node scripts/run-admin-support-smoke.mjs

  audit:
    name: audit
    runs-on: ubuntu-latest
    needs: gitleaks
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Production dependency audit
        run: npm audit --omit=dev --audit-level=high
