name: Codex Autofix

# Triggered by our /api/webhooks/sentry endpoint via repository_dispatch
# when Sentry detects a new production error.
#
# Flow:
#   1. Sentry error → /api/webhooks/sentry → GitHub repository_dispatch
#   2. This workflow runs Codex with full error context
#   3. Codex modifies files to fix the error
#   4. A PR is opened targeting `dev`
#   5. CI runs on the PR (lint, build, proofs)
#   6. If all checks pass, the PR auto-merges
#   7. Vercel deploys the merged code automatically
#
# Required GitHub secrets:
#   OPENAI_API_KEY  — for Codex CLI
#
# Required repo settings (one-time, manual):
#   Settings → General → Pull Requests → Allow auto-merge ✓
#   Settings → Branches → dev branch protection → require status checks:
#     gitleaks, lint-build, proofs

on:
  repository_dispatch:
    types: [sentry-error]

permissions:
  contents: write
  pull-requests: write

jobs:
  autofix:
    name: Codex autofix
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Pin npm
        run: npm install -g npm@11.9.0

      - name: Install dependencies
        run: |
          set -o pipefail
          npm ci 2>&1 | awk '!/The configuration property `package.json#prisma`/ && !/The Prisma config file in prisma.config.ts overrides/'

      - name: Generate Prisma client
        run: |
          set -o pipefail
          npx prisma generate 2>&1 | awk '!/The configuration property `package.json#prisma`/ && !/The Prisma config file in prisma.config.ts overrides/'

      - name: Run Codex autofix
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          PROMPT="Fix this production error reported by Sentry.

          Error: ${{ github.event.client_payload.error_title }}
          Location: ${{ github.event.client_payload.culprit }}
          Sentry issue: ${{ github.event.client_payload.issue_url }}

          Stack trace:
          ${{ github.event.client_payload.stack_trace }}

          Rules:
          - Only fix the root cause — do not refactor unrelated code
          - Keep all TypeScript types strict (no any)
          - Do not change API contracts, Prisma schema, or i18n keys
          - Do not add new dependencies
          - Monetary values are always integer cents"

          npx @openai/codex --model o4-mini --full-auto "$PROMPT"

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: codex/autofix-${{ github.event.client_payload.issue_id }}
          base: dev
          commit-message: "fix: codex autofix for sentry issue ${{ github.event.client_payload.issue_id }}"
          title: "🤖 Codex: ${{ github.event.client_payload.error_title }}"
          body: |
            ## Automated fix by Codex

            | Field | Value |
            |-------|-------|
            | **Sentry issue** | ${{ github.event.client_payload.issue_url }} |
            | **Error** | `${{ github.event.client_payload.error_title }}` |
            | **Location** | `${{ github.event.client_payload.culprit }}` |

            **Stack trace:**
            ```
            ${{ github.event.client_payload.stack_trace }}
            ```

            ---
            This PR was automatically generated by OpenAI Codex.
            It will auto-merge once `gitleaks`, `lint-build`, and `proofs` pass.
            Vercel will deploy a preview immediately and production after merge.
          labels: |
            codex-autofix
            automated
          delete-branch: true

      - name: No changes detected
        if: steps.cpr.outputs.pull-request-number == ''
        run: |
          echo "Codex made no file changes — the error may require manual investigation."
          echo "Sentry issue: ${{ github.event.client_payload.issue_url }}"

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number != ''
        run: gh pr merge --auto --squash "${{ steps.cpr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
