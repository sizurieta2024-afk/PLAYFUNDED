<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="pf-mark-title pf-mark-desc">
  <title id="pf-mark-title">PlayFunded logo mark</title>
  <desc id="pf-mark-desc">A faceted P mark in gold, ivory, and a small pink accent.</desc>
  <defs>
    <linearGradient id="pfGoldMain" x1="20%" y1="8%" x2="82%" y2="92%">
      <stop offset="0%" stop-color="#FFEAB1"/>
      <stop offset="42%" stop-color="#D8B85F"/>
      <stop offset="100%" stop-color="#9D7525"/>
    </linearGradient>
    <linearGradient id="pfGoldLight" x1="8%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#FFF2C8"/>
      <stop offset="52%" stop-color="#E9CD79"/>
      <stop offset="100%" stop-color="#C29637"/>
    </linearGradient>
    <linearGradient id="pfGoldDeep" x1="0%" y1="18%" x2="100%" y2="88%">
      <stop offset="0%" stop-color="#F4D675"/>
      <stop offset="100%" stop-color="#8C681E"/>
    </linearGradient>
    <linearGradient id="pfIvory" x1="14%" y1="0%" x2="88%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="62%" stop-color="#EEE5D5"/>
      <stop offset="100%" stop-color="#CFC2AA"/>
    </linearGradient>
    <linearGradient id="pfIvoryWarm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF7E8"/>
      <stop offset="100%" stop-color="#D9C8A9"/>
    </linearGradient>
    <linearGradient id="pfPink" x1="15%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#FF6BA7"/>
      <stop offset="55%" stop-color="#F6267F"/>
      <stop offset="100%" stop-color="#C91463"/>
    </linearGradient>
    <linearGradient id="pfEdge" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#11100F" stop-opacity="0.78"/>
      <stop offset="100%" stop-color="#050505" stop-opacity="0.96"/>
    </linearGradient>
    <filter id="pfDrop" x="-18%" y="-10%" width="136%" height="128%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#000000" flood-opacity="0.38"/>
      <feDropShadow dx="7" dy="8" stdDeviation="5" flood-color="#000000" flood-opacity="0.24"/>
    </filter>
    <filter id="pfInset" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="1.6" flood-color="#FFFFFF" flood-opacity="0.28"/>
      <feDropShadow dx="3" dy="5" stdDeviation="2.2" flood-color="#000000" flood-opacity="0.26"/>
    </filter>
    <filter id="pfGrain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="2" seed="11" result="grain"/>
      <feColorMatrix in="grain" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <g filter="url(#pfDrop)" transform="translate(24 14)">
