    <path d="M948 546 L594 790 L594 704 L948 462 Z" fill="url(#pfGoldDeep)" opacity="0.48"/>

    <path d="M391 644 L586 538 L586 826 L266 976 Z" fill="url(#pfIvoryWarm)" filter="url(#pfInset)"/>
    <path d="M421 656 L568 576 L566 802 L306 924 Z" fill="#FFFFFF" opacity="0.28"/>
    <path d="M586 538 L596 536 L594 790 L586 826 Z" fill="#272018" opacity="0.35"/>
    <path d="M391 644 L266 976 L246 958 L372 630 Z" fill="#070706" opacity="0.58"/>

    <path d="M530 305 L574 323 L464 637 L391 644 Z" fill="url(#pfEdge)" opacity="0.96"/>
    <path d="M548 285 L596 536 L574 523 L530 305 Z" fill="#10100E" opacity="0.88"/>
    <path d="M594 790 L586 826 L266 976 L286 939 Z" fill="#0B0A09" opacity="0.16"/>

    <g filter="url(#pfGrain)" opacity="0.5">
      <path d="M252 220 L585 48 L531 430 L410 714 L270 972 Q254 1000 235 979 L229 254 Q229 231 252 220 Z" fill="#FFFFFF"/>
      <path d="M596 536 L943 300 L948 546 L594 790 Z" fill="#FFFFFF"/>
      <path d="M391 644 L586 538 L586 826 L266 976 Z" fill="#FFFFFF"/>
