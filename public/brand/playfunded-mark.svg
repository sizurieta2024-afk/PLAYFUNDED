    <path d="M548 285 L774 402 L790 426 L540 300 Z" fill="#090807" opacity="0.72"/>

    <path d="M624 51 L934 256 L791 402 L774 402 Z" fill="url(#pfIvory)" filter="url(#pfInset)"/>
    <path d="M652 76 L904 252 L795 366 Z" fill="#FFFFFF" opacity="0.36"/>
    <path d="M774 402 L934 256 L946 273 L791 421 Z" fill="#050505" opacity="0.7"/>

    <path d="M596 536 L943 300 L948 546 L594 790 Z" fill="url(#pfGoldLight)" filter="url(#pfInset)"/>
